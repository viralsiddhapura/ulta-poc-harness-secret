# =============================================================================
# Input Set for PROD Environment
# Pre-configured values for production environment deployments
# NOTE: Production requires additional approvals and safeguards
# =============================================================================

inputSet:
  name: Prod Environment Input Set
  identifier: prod_environment_inputset
  orgIdentifier: <+input>
  projectIdentifier: <+input>
  description: Pre-configured inputs for PROD environment deployments

  # Pipeline 1 Inputs - Production
  pipeline:
    identifier: pipeline_1_service_accounts_setup
    variables:
      - name: environment
        type: String
        value: prod
      - name: confluent_environment_id
        type: String
        value: "env-yyyyy"  # Replace with your prod environment ID
      - name: confluent_kafka_cluster_id
        type: String
        value: "lkc-yyyyy"  # Replace with your prod cluster ID
      - name: confluent_service_account_name
        type: String
        value: "pubsub-connector-sa-prod"
      - name: connector_name
        type: String
        value: "gcp-pubsub-source-prod"
      - name: kafka_topic
        type: String
        value: "pubsub.gcp_input_prod"
      - name: gcp_project_id
        type: String
        value: "your-gcp-project-prod"  # Replace with your GCP project
      - name: gcp_service_account_id
        type: String
        value: "confluent-pubsub-reader-prod"
      - name: pubsub_subscription_id
        type: String
        value: "your-pubsub-subscription-prod"  # Replace with your subscription

---
# Input Set for Pipeline 2 - Production
inputSet:
  name: Prod Environment Connector Input Set
  identifier: prod_environment_connector_inputset
  orgIdentifier: <+input>
  projectIdentifier: <+input>
  description: Pre-configured inputs for PROD connector deployment

  pipeline:
    identifier: pipeline_2_connector_deployment
    variables:
      - name: environment
        type: String
        value: prod
      - name: confluent_environment_id
        type: String
        value: "env-yyyyy"  # Replace with your prod environment ID
      - name: confluent_kafka_cluster_id
        type: String
        value: "lkc-yyyyy"  # Replace with your prod cluster ID
      - name: connector_name
        type: String
        value: "gcp-pubsub-source-prod"
      - name: kafka_topic
        type: String
        value: "pubsub.gcp_input_prod"
      - name: tasks_max
        type: Number
        value: 2  # Higher for production
      - name: output_data_format
        type: String
        value: "JSON"
      - name: gcp_project_id
        type: String
        value: "your-gcp-project-prod"  # Replace with your GCP project
      - name: pubsub_subscription_id
        type: String
        value: "your-pubsub-subscription-prod"  # Replace with your subscription
