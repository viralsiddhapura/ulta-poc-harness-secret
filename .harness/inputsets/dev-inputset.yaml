# =============================================================================
# Input Set for DEV Environment
# Pre-configured values for development environment deployments
# =============================================================================

inputSet:
  name: Dev Environment Input Set
  identifier: dev_environment_inputset
  orgIdentifier: <+input>
  projectIdentifier: <+input>
  description: Pre-configured inputs for DEV environment deployments

  # Pipeline 1 Inputs
  pipeline:
    identifier: pipeline_1_service_accounts_setup
    variables:
      - name: environment
        type: String
        value: dev
      - name: confluent_environment_id
        type: String
        value: "env-xxxxx"  # Replace with your dev environment ID
      - name: confluent_kafka_cluster_id
        type: String
        value: "lkc-xxxxx"  # Replace with your dev cluster ID
      - name: confluent_service_account_name
        type: String
        value: "pubsub-connector-sa-dev"
      - name: connector_name
        type: String
        value: "gcp-pubsub-source-dev"
      - name: kafka_topic
        type: String
        value: "pubsub.gcp_input_dev"
      - name: gcp_project_id
        type: String
        value: "your-gcp-project-dev"  # Replace with your GCP project
      - name: gcp_service_account_id
        type: String
        value: "confluent-pubsub-reader-dev"
      - name: pubsub_subscription_id
        type: String
        value: "your-pubsub-subscription-dev"  # Replace with your subscription

---
# Input Set for Pipeline 2
inputSet:
  name: Dev Environment Connector Input Set
  identifier: dev_environment_connector_inputset
  orgIdentifier: <+input>
  projectIdentifier: <+input>
  description: Pre-configured inputs for DEV connector deployment

  pipeline:
    identifier: pipeline_2_connector_deployment
    variables:
      - name: environment
        type: String
        value: dev
      - name: confluent_environment_id
        type: String
        value: "env-xxxxx"  # Replace with your dev environment ID
      - name: confluent_kafka_cluster_id
        type: String
        value: "lkc-xxxxx"  # Replace with your dev cluster ID
      - name: connector_name
        type: String
        value: "gcp-pubsub-source-dev"
      - name: kafka_topic
        type: String
        value: "pubsub.gcp_input_dev"
      - name: tasks_max
        type: Number
        value: 1
      - name: output_data_format
        type: String
        value: "JSON"
      - name: gcp_project_id
        type: String
        value: "your-gcp-project-dev"  # Replace with your GCP project
      - name: pubsub_subscription_id
        type: String
        value: "your-pubsub-subscription-dev"  # Replace with your subscription
