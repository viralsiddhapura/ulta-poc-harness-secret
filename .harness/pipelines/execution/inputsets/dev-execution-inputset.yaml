inputSet:
  name: Dev Environment Execution
  identifier: dev_execution_inputset
  orgIdentifier: <YOUR_ORG_IDENTIFIER>
  projectIdentifier: <YOUR_PROJECT_IDENTIFIER>
  pipeline:
    identifier: gcp_pubsub_connector_execution
    variables:
      # Confluent Cloud Configuration
      - name: confluent_environment_id
        type: String
        value: <YOUR_CONFLUENT_ENVIRONMENT_ID>  # e.g., env-xxxxx

      - name: confluent_kafka_cluster_id
        type: String
        value: <YOUR_KAFKA_CLUSTER_ID>  # e.g., lkc-xxxxx

      # Connector Configuration
      - name: connector_name
        type: String
        value: gcp-pubsub-source-dev

      - name: kafka_topic
        type: String
        value: <YOUR_KAFKA_TOPIC>  # e.g., my.events.topic

      - name: tasks_max
        type: Number
        value: 1

      - name: output_data_format
        type: String
        value: JSON

      # GCP Configuration
      - name: gcp_project_id
        type: String
        value: <YOUR_GCP_PROJECT_ID>  # e.g., my-gcp-project

      - name: pubsub_topic_id
        type: String
        value: <YOUR_PUBSUB_TOPIC_ID>  # e.g., my-pubsub-topic

      - name: pubsub_subscription_id
        type: String
        value: <YOUR_PUBSUB_SUBSCRIPTION_ID>  # e.g., my-subscription
