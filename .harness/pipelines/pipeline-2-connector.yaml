pipeline:
  name: Pipeline 2 - Connector Deployment
  identifier: pipeline_2_connector_deployment
  projectIdentifier: <+input>
  orgIdentifier: <+input>
  description: |
    Deploys the GCP Pub/Sub Source Connector using secrets created by Pipeline 1.
    This pipeline should only run after Pipeline 1 has successfully completed.
  tags:
    environment: <+input>
    team: platform
    component: kafka-connector

  properties:
    ci:
      codebase:
        connectorRef: <+input>
        repoName: harness-terraform-poc
        build: <+input>

  stages:
    # =========================================================================
    # Stage 1: Pre-flight Checks
    # =========================================================================
    - stage:
        name: Pre-flight Checks
        identifier: preflight_checks
        description: Verify prerequisites before deployment
        type: Custom
        spec:
          execution:
            steps:
              # -----------------------------------------------------------------
              # Step 1: Verify Secrets Exist
              # -----------------------------------------------------------------
              - step:
                  name: Verify Secrets
                  identifier: verify_secrets
                  type: ShellScript
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |
                          #!/bin/bash
                          set -e

                          echo "=== Verifying Required Secrets ==="

                          # Check if secrets from Pipeline 1 are accessible
                          # This will fail if secrets don't exist

                          if [ -z "<+secrets.getValue('connector_kafka_api_key_<+pipeline.variables.environment>')>" ]; then
                            echo "ERROR: connector_kafka_api_key not found. Run Pipeline 1 first."
                            exit 1
                          fi
                          echo "✓ connector_kafka_api_key exists"

                          if [ -z "<+secrets.getValue('connector_kafka_api_secret_<+pipeline.variables.environment>')>" ]; then
                            echo "ERROR: connector_kafka_api_secret not found. Run Pipeline 1 first."
                            exit 1
                          fi
                          echo "✓ connector_kafka_api_secret exists"

                          if [ -z "<+secrets.getValue('connector_gcp_sa_key_<+pipeline.variables.environment>')>" ]; then
                            echo "ERROR: connector_gcp_sa_key not found. Run Pipeline 1 first."
                            exit 1
                          fi
                          echo "✓ connector_gcp_sa_key exists"

                          echo "=== All secrets verified ==="
                  timeout: 2m

              # -----------------------------------------------------------------
              # Step 2: Validate Configuration
              # -----------------------------------------------------------------
              - step:
                  name: Validate Configuration
                  identifier: validate_config
                  type: ShellScript
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |
                          #!/bin/bash
                          set -e

                          echo "=== Validating Configuration ==="

                          # Validate environment ID format
                          if [[ ! "<+pipeline.variables.confluent_environment_id>" =~ ^env-[a-z0-9]+$ ]]; then
                            echo "ERROR: Invalid environment ID format"
                            exit 1
                          fi
                          echo "✓ Environment ID format valid"

                          # Validate cluster ID format
                          if [[ ! "<+pipeline.variables.confluent_kafka_cluster_id>" =~ ^lkc-[a-z0-9]+$ ]]; then
                            echo "ERROR: Invalid cluster ID format"
                            exit 1
                          fi
                          echo "✓ Cluster ID format valid"

                          # Validate topic name
                          if [ -z "<+pipeline.variables.kafka_topic>" ]; then
                            echo "ERROR: Kafka topic cannot be empty"
                            exit 1
                          fi
                          echo "✓ Kafka topic specified"

                          echo "=== Configuration validated ==="
                  timeout: 2m
        tags: {}

    # =========================================================================
    # Stage 2: Terraform Plan
    # =========================================================================
    - stage:
        name: Terraform Plan
        identifier: terraform_plan
        description: Plan connector deployment
        type: Custom
        spec:
          execution:
            steps:
              # -----------------------------------------------------------------
              # Step 1: Terraform Init
              # -----------------------------------------------------------------
              - step:
                  name: Terraform Init
                  identifier: terraform_init
                  type: ShellScript
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |
                          #!/bin/bash
                          set -e

                          cd terraform/environments/dev/connector

                          echo "=== Terraform Init ==="
                          terraform init -input=false

                          echo "=== Terraform Validate ==="
                          terraform validate

                          echo "=== Init Complete ==="
                  timeout: 5m

              # -----------------------------------------------------------------
              # Step 2: Terraform Plan
              # -----------------------------------------------------------------
              - step:
                  name: Terraform Plan
                  identifier: terraform_plan_step
                  type: ShellScript
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |
                          #!/bin/bash
                          set -e

                          cd terraform/environments/dev/connector

                          echo "=== Terraform Plan ==="
                          terraform plan \
                            -var="confluent_environment_id=<+pipeline.variables.confluent_environment_id>" \
                            -var="confluent_kafka_cluster_id=<+pipeline.variables.confluent_kafka_cluster_id>" \
                            -var="connector_name=<+pipeline.variables.connector_name>" \
                            -var="kafka_topic=<+pipeline.variables.kafka_topic>" \
                            -var="tasks_max=<+pipeline.variables.tasks_max>" \
                            -var="output_data_format=<+pipeline.variables.output_data_format>" \
                            -var="gcp_project_id=<+pipeline.variables.gcp_project_id>" \
                            -var="pubsub_subscription_id=<+pipeline.variables.pubsub_subscription_id>" \
                            -out=tfplan \
                            -input=false

                          echo "=== Plan saved ==="

                          # Show plan summary
                          terraform show -no-color tfplan | head -100
                    environmentVariables:
                      # Confluent Cloud API credentials
                      - name: TF_VAR_confluent_cloud_api_key
                        type: Secret
                        value: <+secrets.getValue('confluent_cloud_api_key')>
                      - name: TF_VAR_confluent_cloud_api_secret
                        type: Secret
                        value: <+secrets.getValue('confluent_cloud_api_secret')>
                      # Connector credentials (from Pipeline 1)
                      - name: TF_VAR_kafka_api_key
                        type: Secret
                        value: <+secrets.getValue('connector_kafka_api_key_<+pipeline.variables.environment>')>
                      - name: TF_VAR_kafka_api_secret
                        type: Secret
                        value: <+secrets.getValue('connector_kafka_api_secret_<+pipeline.variables.environment>')>
                      - name: TF_VAR_gcp_credentials_base64
                        type: Secret
                        value: <+secrets.getValue('connector_gcp_sa_key_<+pipeline.variables.environment>')>
                  timeout: 10m
        tags: {}

    # =========================================================================
    # Stage 3: Approval Gate
    # =========================================================================
    - stage:
        name: Approval
        identifier: approval
        description: Manual approval before deploying connector
        type: Approval
        spec:
          execution:
            steps:
              - step:
                  name: Approve Connector Deployment
                  identifier: approve_deployment
                  type: HarnessApproval
                  spec:
                    approvalMessage: |
                      Please review the Terraform plan for connector deployment.

                      Connector Details:
                      - Name: <+pipeline.variables.connector_name>
                      - Kafka Topic: <+pipeline.variables.kafka_topic>
                      - GCP Project: <+pipeline.variables.gcp_project_id>
                      - Pub/Sub Subscription: <+pipeline.variables.pubsub_subscription_id>

                      This will deploy a GCP Pub/Sub Source Connector to Confluent Cloud.

                      Approve to proceed.
                    includePipelineExecutionHistory: true
                    approvers:
                      userGroups:
                        - <+input>
                      minimumCount: 1
                      disallowPipelineExecutor: false
                    approverInputs: []
                  timeout: 1d
        tags: {}

    # =========================================================================
    # Stage 4: Terraform Apply
    # =========================================================================
    - stage:
        name: Terraform Apply
        identifier: terraform_apply
        description: Deploy the connector
        type: Custom
        spec:
          execution:
            steps:
              # -----------------------------------------------------------------
              # Step 1: Terraform Apply
              # -----------------------------------------------------------------
              - step:
                  name: Terraform Apply
                  identifier: terraform_apply_step
                  type: ShellScript
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |
                          #!/bin/bash
                          set -e

                          cd terraform/environments/dev/connector

                          echo "=== Terraform Init (in case of new delegate) ==="
                          terraform init -input=false

                          echo "=== Terraform Apply ==="
                          terraform apply \
                            -var="confluent_environment_id=<+pipeline.variables.confluent_environment_id>" \
                            -var="confluent_kafka_cluster_id=<+pipeline.variables.confluent_kafka_cluster_id>" \
                            -var="connector_name=<+pipeline.variables.connector_name>" \
                            -var="kafka_topic=<+pipeline.variables.kafka_topic>" \
                            -var="tasks_max=<+pipeline.variables.tasks_max>" \
                            -var="output_data_format=<+pipeline.variables.output_data_format>" \
                            -var="gcp_project_id=<+pipeline.variables.gcp_project_id>" \
                            -var="pubsub_subscription_id=<+pipeline.variables.pubsub_subscription_id>" \
                            -auto-approve \
                            -input=false

                          echo "=== Apply Complete ==="

                          # Capture connector ID for output
                          CONNECTOR_ID=$(terraform output -raw connector_id)
                          echo "Connector ID: $CONNECTOR_ID"
                    environmentVariables:
                      # Confluent Cloud API credentials
                      - name: TF_VAR_confluent_cloud_api_key
                        type: Secret
                        value: <+secrets.getValue('confluent_cloud_api_key')>
                      - name: TF_VAR_confluent_cloud_api_secret
                        type: Secret
                        value: <+secrets.getValue('confluent_cloud_api_secret')>
                      # Connector credentials (from Pipeline 1)
                      - name: TF_VAR_kafka_api_key
                        type: Secret
                        value: <+secrets.getValue('connector_kafka_api_key_<+pipeline.variables.environment>')>
                      - name: TF_VAR_kafka_api_secret
                        type: Secret
                        value: <+secrets.getValue('connector_kafka_api_secret_<+pipeline.variables.environment>')>
                      - name: TF_VAR_gcp_credentials_base64
                        type: Secret
                        value: <+secrets.getValue('connector_gcp_sa_key_<+pipeline.variables.environment>')>
                    outputVariables:
                      - name: connector_id
                        type: String
                        value: CONNECTOR_ID
                  timeout: 15m

              # -----------------------------------------------------------------
              # Step 2: Verify Connector Status
              # -----------------------------------------------------------------
              - step:
                  name: Verify Connector Status
                  identifier: verify_status
                  type: ShellScript
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |
                          #!/bin/bash
                          set -e

                          cd terraform/environments/dev/connector

                          echo "=== Checking Connector Status ==="

                          STATUS=$(terraform output -json connector_status | jq -r '.')
                          echo "Connector Status: $STATUS"

                          # Basic validation - check if status contains expected fields
                          if echo "$STATUS" | grep -q "RUNNING\|PROVISIONING"; then
                            echo "✓ Connector is running or provisioning"
                          else
                            echo "⚠ Connector status: $STATUS"
                            echo "Note: Connector may still be initializing"
                          fi

                          echo "=== Deployment Summary ==="
                          terraform output deployment_info
                  timeout: 5m
        tags: {}

    # =========================================================================
    # Stage 5: Post-Deployment Validation (Optional)
    # =========================================================================
    - stage:
        name: Post-Deployment Validation
        identifier: validation
        description: Validate connector is working
        type: Custom
        spec:
          execution:
            steps:
              - step:
                  name: Wait for Connector
                  identifier: wait_connector
                  type: ShellScript
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |
                          #!/bin/bash

                          echo "=== Waiting for connector to stabilize ==="
                          echo "Waiting 60 seconds for connector to fully initialize..."
                          sleep 60

                          echo "=== Connector Deployment Complete ==="
                          echo ""
                          echo "Connector Details:"
                          echo "  Name: <+pipeline.variables.connector_name>"
                          echo "  Environment: <+pipeline.variables.confluent_environment_id>"
                          echo "  Cluster: <+pipeline.variables.confluent_kafka_cluster_id>"
                          echo "  Kafka Topic: <+pipeline.variables.kafka_topic>"
                          echo "  GCP Project: <+pipeline.variables.gcp_project_id>"
                          echo "  Pub/Sub Subscription: <+pipeline.variables.pubsub_subscription_id>"
                          echo ""
                          echo "To check connector status:"
                          echo "  1. Go to Confluent Cloud Console"
                          echo "  2. Navigate to your cluster"
                          echo "  3. Click on 'Connectors'"
                          echo "  4. Find '<+pipeline.variables.connector_name>'"
                  timeout: 5m
        tags: {}

  # ===========================================================================
  # Pipeline Variables
  # ===========================================================================
  variables:
    - name: environment
      type: String
      description: Target environment (must match Pipeline 1)
      required: true
      default: dev
    - name: confluent_environment_id
      type: String
      description: Confluent Cloud Environment ID
      required: true
    - name: confluent_kafka_cluster_id
      type: String
      description: Confluent Cloud Kafka Cluster ID
      required: true
    - name: connector_name
      type: String
      description: Name for the connector
      required: true
      default: gcp-pubsub-source-dev
    - name: kafka_topic
      type: String
      description: Target Kafka topic
      required: true
    - name: tasks_max
      type: Number
      description: Maximum number of connector tasks
      required: false
      default: 1
    - name: output_data_format
      type: String
      description: Output data format (JSON, AVRO, etc.)
      required: false
      default: JSON
    - name: gcp_project_id
      type: String
      description: GCP Project ID
      required: true
    - name: pubsub_subscription_id
      type: String
      description: Pub/Sub subscription ID
      required: true

  # ===========================================================================
  # Notifications
  # ===========================================================================
  notificationRules:
    - name: Pipeline Status
      identifier: pipeline_status
      pipelineEvents:
        - type: PipelineSuccess
        - type: PipelineFailed
      notificationMethod:
        type: Email
        spec:
          userGroups: []
          recipients:
            - <+input>
      enabled: true
