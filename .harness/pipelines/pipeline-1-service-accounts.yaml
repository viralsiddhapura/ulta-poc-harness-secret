pipeline:
  name: Pipeline 1 - Service Accounts Setup
  identifier: pipeline_1_service_accounts_setup
  projectIdentifier: harnesssecretterraformgithubpoc
  orgIdentifier: default
  description: |
    Creates Confluent Cloud and GCP service accounts with API keys.
    Outputs are stored in Harness Secret Manager for use by Pipeline 2.
  tags:
    environment: dev
    team: platform
    component: kafka-connector

  properties:
    ci:
      codebase:
        connectorRef: githubconnector
        repoName: ulta-poc-harness-secret
        build:
          type: branch
          spec:
            branch: main

  stages:
    # =========================================================================
    # Stage 1: Terraform Init & Plan for Service Accounts
    # =========================================================================
    - stage:
        name: Terraform Plan
        identifier: terraform_plan
        description: Initialize Terraform and create execution plan
        type: Custom
        spec:
          delegateSelectors:
            - terraform-delegate
          execution:
            steps:
              # -----------------------------------------------------------------
              # Step 0: Clone Repository
              # -----------------------------------------------------------------
              - step:
                  name: Clone Repository
                  identifier: clone_repo
                  type: ShellScript
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |
                          #!/bin/bash
                          set -e

                          echo "=== Downloading repository ==="
                          WORK_DIR="/tmp/harness-workspace"
                          rm -rf $WORK_DIR
                          mkdir -p $WORK_DIR
                          cd $WORK_DIR

                          # Download public repo as tarball (no auth needed, tar is more universal)
                          curl -L -o repo.tar.gz "https://github.com/viralsiddhapura/ulta-poc-harness-secret/archive/refs/heads/main.tar.gz"

                          # Extract and move files to workspace root
                          tar -xzf repo.tar.gz
                          mv ulta-poc-harness-secret-main/* .
                          rm -rf ulta-poc-harness-secret-main repo.tar.gz

                          echo "=== Repository downloaded ==="
                          ls -la
                          echo "=== Checking for terraform directory ==="
                          ls -la terraform/ 2>/dev/null || echo "ERROR: terraform/ directory not found!"
                          ls -la terraform/environments/dev/ 2>/dev/null || echo "ERROR: terraform/environments/dev/ not found!"
                    environmentVariables: []
                    outputVariables:
                      - name: work_dir
                        type: String
                        value: /tmp/harness-workspace
                  timeout: 5m

              # -----------------------------------------------------------------
              # Step 1: Setup Secrets for Terraform
              # -----------------------------------------------------------------
              - step:
                  name: Setup Secrets
                  identifier: setup_secrets
                  type: ShellScript
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |
                          #!/bin/bash
                          set -e

                          echo "=== Setting up secrets directory ==="
                          mkdir -p /tmp/harness-secrets

                          # Write GCP bootstrap credentials to file using cat heredoc
                          cat > /tmp/harness-secrets/gcp-bootstrap-key.json << 'GCPCREDS'
                          <+secrets.getValue("gcp_bootstrap_credentials_json")>
                          GCPCREDS

                          # Remove leading whitespace from heredoc
                          sed -i 's/^[[:space:]]*//' /tmp/harness-secrets/gcp-bootstrap-key.json

                          echo "=== Verifying GCP credentials file ==="
                          echo "First 50 chars of credentials file:"
                          head -c 50 /tmp/harness-secrets/gcp-bootstrap-key.json || true
                          echo ""

                          if [ -f /tmp/harness-secrets/gcp-bootstrap-key.json ]; then
                            echo "GCP credentials file created successfully"
                            # Quick JSON validation - check if it starts with {
                            if head -c 1 /tmp/harness-secrets/gcp-bootstrap-key.json | grep -q '{'; then
                              echo "GCP credentials JSON format looks valid"
                            else
                              echo "WARNING: GCP credentials may not be valid JSON"
                            fi
                          else
                            echo "ERROR: Failed to create GCP credentials file"
                            exit 1
                          fi

                          echo "=== Secrets setup complete ==="
                    environmentVariables: []
                    outputVariables:
                      - name: secrets_path
                        type: String
                        value: /tmp/harness-secrets
                  timeout: 2m

              # -----------------------------------------------------------------
              # Step 2: Terraform Init
              # -----------------------------------------------------------------
              - step:
                  name: Terraform Init
                  identifier: terraform_init
                  type: ShellScript
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |
                          #!/bin/bash
                          set -e

                          cd /tmp/harness-workspace/terraform/environments/dev/service-accounts

                          echo "=== Terraform Init ==="
                          terraform init -input=false

                          echo "=== Terraform Version ==="
                          terraform version
                    environmentVariables:
                      - name: TF_VAR_confluent_cloud_api_key
                        type: Secret
                        value: <+secrets.getValue('confluent_cloud_api_key')>
                      - name: TF_VAR_confluent_cloud_api_secret
                        type: Secret
                        value: <+secrets.getValue('confluent_cloud_api_secret')>
                      - name: GOOGLE_APPLICATION_CREDENTIALS
                        type: String
                        value: /tmp/harness-secrets/gcp-bootstrap-key.json
                  timeout: 5m

              # -----------------------------------------------------------------
              # Step 3: Terraform Plan
              # -----------------------------------------------------------------
              - step:
                  name: Terraform Plan
                  identifier: terraform_plan_step
                  type: ShellScript
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |
                          #!/bin/bash
                          set -e

                          cd /tmp/harness-workspace/terraform/environments/dev/service-accounts

                          echo "=== Terraform Plan ==="
                          terraform plan \
                            -var="confluent_environment_id=<+pipeline.variables.confluent_environment_id>" \
                            -var="confluent_kafka_cluster_id=<+pipeline.variables.confluent_kafka_cluster_id>" \
                            -var="confluent_service_account_name=<+pipeline.variables.confluent_service_account_name>" \
                            -var="connector_name=<+pipeline.variables.connector_name>" \
                            -var="kafka_topic=<+pipeline.variables.kafka_topic>" \
                            -var="gcp_project_id=<+pipeline.variables.gcp_project_id>" \
                            -var="gcp_service_account_id=<+pipeline.variables.gcp_service_account_id>" \
                            -var="pubsub_subscription_id=<+pipeline.variables.pubsub_subscription_id>" \
                            -out=tfplan \
                            -input=false

                          echo "=== Plan saved to tfplan ==="
                    environmentVariables:
                      - name: TF_VAR_confluent_cloud_api_key
                        type: Secret
                        value: <+secrets.getValue('confluent_cloud_api_key')>
                      - name: TF_VAR_confluent_cloud_api_secret
                        type: Secret
                        value: <+secrets.getValue('confluent_cloud_api_secret')>
                      - name: GOOGLE_APPLICATION_CREDENTIALS
                        type: String
                        value: /tmp/harness-secrets/gcp-bootstrap-key.json
                  timeout: 10m
        tags: {}

    # =========================================================================
    # Stage 2: Approval Gate
    # =========================================================================
    - stage:
        name: Approval
        identifier: approval
        description: Manual approval before applying changes
        type: Approval
        spec:
          execution:
            steps:
              - step:
                  name: Approve Terraform Apply
                  identifier: approve_terraform_apply
                  type: HarnessApproval
                  spec:
                    approvalMessage: |
                      Please review the Terraform plan from the previous stage.

                      This will create:
                      - Confluent Cloud Service Account
                      - Confluent Kafka API Key
                      - GCP Service Account
                      - GCP Service Account Key

                      Approve to proceed with creation.
                    includePipelineExecutionHistory: true
                    approvers:
                      userGroups:
                        - account._account_all_users
                      minimumCount: 1
                      disallowPipelineExecutor: false
                    approverInputs: []
                  timeout: 1d
        tags: {}

    # =========================================================================
    # Stage 3: Terraform Apply
    # =========================================================================
    - stage:
        name: Terraform Apply
        identifier: terraform_apply
        description: Apply Terraform changes and capture outputs
        type: Custom
        spec:
          delegateSelectors:
            - terraform-delegate
          execution:
            steps:
              # -----------------------------------------------------------------
              # Step 0: Clone Repository (new delegate instance)
              # -----------------------------------------------------------------
              - step:
                  name: Clone Repository
                  identifier: clone_repo_apply
                  type: ShellScript
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |
                          #!/bin/bash
                          set -e

                          echo "=== Downloading repository ==="
                          WORK_DIR="/tmp/harness-workspace"
                          rm -rf $WORK_DIR
                          mkdir -p $WORK_DIR
                          cd $WORK_DIR

                          # Download public repo as tarball (no auth needed, tar is more universal)
                          curl -L -o repo.tar.gz "https://github.com/viralsiddhapura/ulta-poc-harness-secret/archive/refs/heads/main.tar.gz"

                          # Extract and move files to workspace root
                          tar -xzf repo.tar.gz
                          mv ulta-poc-harness-secret-main/* .
                          rm -rf ulta-poc-harness-secret-main repo.tar.gz

                          echo "=== Repository downloaded ==="
                          ls -la
                    environmentVariables: []
                  timeout: 5m

              # -----------------------------------------------------------------
              # Step 1: Re-setup Secrets (new delegate instance)
              # -----------------------------------------------------------------
              - step:
                  name: Setup Secrets
                  identifier: setup_secrets_apply
                  type: ShellScript
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |
                          #!/bin/bash
                          set -e

                          echo "=== Re-setting up secrets directory ==="
                          mkdir -p /tmp/harness-secrets
                          cat > /tmp/harness-secrets/gcp-bootstrap-key.json << 'GCPCREDS'
                          <+secrets.getValue("gcp_bootstrap_credentials_json")>
                          GCPCREDS
                          sed -i 's/^[[:space:]]*//' /tmp/harness-secrets/gcp-bootstrap-key.json
                          echo "=== Secrets setup complete ==="
                  timeout: 2m

              # -----------------------------------------------------------------
              # Step 2: Terraform Apply
              # -----------------------------------------------------------------
              - step:
                  name: Terraform Apply
                  identifier: terraform_apply_step
                  type: ShellScript
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |
                          #!/bin/bash
                          set -e

                          cd /tmp/harness-workspace/terraform/environments/dev/service-accounts

                          echo "=== Terraform Init (in case of new delegate) ==="
                          terraform init -input=false

                          echo "=== Terraform Apply ==="
                          terraform apply \
                            -var="confluent_environment_id=<+pipeline.variables.confluent_environment_id>" \
                            -var="confluent_kafka_cluster_id=<+pipeline.variables.confluent_kafka_cluster_id>" \
                            -var="confluent_service_account_name=<+pipeline.variables.confluent_service_account_name>" \
                            -var="connector_name=<+pipeline.variables.connector_name>" \
                            -var="kafka_topic=<+pipeline.variables.kafka_topic>" \
                            -var="gcp_project_id=<+pipeline.variables.gcp_project_id>" \
                            -var="gcp_service_account_id=<+pipeline.variables.gcp_service_account_id>" \
                            -var="pubsub_subscription_id=<+pipeline.variables.pubsub_subscription_id>" \
                            -auto-approve \
                            -input=false

                          echo "=== Capturing Outputs ==="
                          # Capture outputs for secret storage
                          terraform output -json > /tmp/tf-outputs.json

                          # Extract sensitive values
                          KAFKA_API_KEY=$(terraform output -raw confluent_kafka_api_key)
                          KAFKA_API_SECRET=$(terraform output -raw confluent_kafka_api_secret)
                          GCP_SA_KEY_BASE64=$(terraform output -raw gcp_service_account_key_base64)

                          # Write to files for next step
                          echo "$KAFKA_API_KEY" > /tmp/kafka_api_key.txt
                          echo "$KAFKA_API_SECRET" > /tmp/kafka_api_secret.txt
                          echo "$GCP_SA_KEY_BASE64" > /tmp/gcp_sa_key_base64.txt

                          echo "=== Apply Complete ==="
                    environmentVariables:
                      - name: TF_VAR_confluent_cloud_api_key
                        type: Secret
                        value: <+secrets.getValue('confluent_cloud_api_key')>
                      - name: TF_VAR_confluent_cloud_api_secret
                        type: Secret
                        value: <+secrets.getValue('confluent_cloud_api_secret')>
                      - name: GOOGLE_APPLICATION_CREDENTIALS
                        type: String
                        value: /tmp/harness-secrets/gcp-bootstrap-key.json
                    outputVariables:
                      - name: kafka_api_key
                        type: Secret
                        value: KAFKA_API_KEY
                      - name: kafka_api_secret
                        type: Secret
                        value: KAFKA_API_SECRET
                      - name: gcp_sa_key_base64
                        type: Secret
                        value: GCP_SA_KEY_BASE64
                  timeout: 15m

              # -----------------------------------------------------------------
              # Step 3: Store Secrets in Harness Secret Manager
              # -----------------------------------------------------------------
              - step:
                  name: Store Secrets in Harness
                  identifier: store_secrets
                  type: ShellScript
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |
                          #!/bin/bash
                          set -e

                          echo "=== Storing Terraform Outputs as Harness Secrets ==="

                          # Note: In a real implementation, you would use the Harness API
                          # to create/update secrets. This script demonstrates the pattern.

                          # Using Harness CLI or API to store secrets
                          # Example using curl to Harness API:

                          HARNESS_API_KEY="<+secrets.getValue('harness_api_key')>"
                          HARNESS_ACCOUNT_ID="<+account.identifier>"
                          HARNESS_ORG_ID="<+org.identifier>"
                          HARNESS_PROJECT_ID="<+project.identifier>"

                          KAFKA_API_KEY=$(cat /tmp/kafka_api_key.txt)
                          KAFKA_API_SECRET=$(cat /tmp/kafka_api_secret.txt)
                          GCP_SA_KEY_BASE64=$(cat /tmp/gcp_sa_key_base64.txt)

                          # Store Kafka API Key
                          curl -s -X POST "https://app.harness.io/ng/api/v2/secrets" \
                            -H "x-api-key: $HARNESS_API_KEY" \
                            -H "Content-Type: application/json" \
                            -H "Harness-Account: $HARNESS_ACCOUNT_ID" \
                            -d "{
                              \"secret\": {
                                \"type\": \"SecretText\",
                                \"name\": \"connector_kafka_api_key_<+pipeline.variables.environment>\",
                                \"identifier\": \"connector_kafka_api_key_<+pipeline.variables.environment>\",
                                \"orgIdentifier\": \"$HARNESS_ORG_ID\",
                                \"projectIdentifier\": \"$HARNESS_PROJECT_ID\",
                                \"spec\": {
                                  \"secretManagerIdentifier\": \"harnessSecretManager\",
                                  \"valueType\": \"Inline\",
                                  \"value\": \"$KAFKA_API_KEY\"
                                }
                              }
                            }" || echo "Secret may already exist, attempting update..."

                          # Store Kafka API Secret
                          curl -s -X POST "https://app.harness.io/ng/api/v2/secrets" \
                            -H "x-api-key: $HARNESS_API_KEY" \
                            -H "Content-Type: application/json" \
                            -H "Harness-Account: $HARNESS_ACCOUNT_ID" \
                            -d "{
                              \"secret\": {
                                \"type\": \"SecretText\",
                                \"name\": \"connector_kafka_api_secret_<+pipeline.variables.environment>\",
                                \"identifier\": \"connector_kafka_api_secret_<+pipeline.variables.environment>\",
                                \"orgIdentifier\": \"$HARNESS_ORG_ID\",
                                \"projectIdentifier\": \"$HARNESS_PROJECT_ID\",
                                \"spec\": {
                                  \"secretManagerIdentifier\": \"harnessSecretManager\",
                                  \"valueType\": \"Inline\",
                                  \"value\": \"$KAFKA_API_SECRET\"
                                }
                              }
                            }" || echo "Secret may already exist, attempting update..."

                          # Store GCP SA Key
                          curl -s -X POST "https://app.harness.io/ng/api/v2/secrets" \
                            -H "x-api-key: $HARNESS_API_KEY" \
                            -H "Content-Type: application/json" \
                            -H "Harness-Account: $HARNESS_ACCOUNT_ID" \
                            -d "{
                              \"secret\": {
                                \"type\": \"SecretText\",
                                \"name\": \"connector_gcp_sa_key_<+pipeline.variables.environment>\",
                                \"identifier\": \"connector_gcp_sa_key_<+pipeline.variables.environment>\",
                                \"orgIdentifier\": \"$HARNESS_ORG_ID\",
                                \"projectIdentifier\": \"$HARNESS_PROJECT_ID\",
                                \"spec\": {
                                  \"secretManagerIdentifier\": \"harnessSecretManager\",
                                  \"valueType\": \"Inline\",
                                  \"value\": \"$GCP_SA_KEY_BASE64\"
                                }
                              }
                            }" || echo "Secret may already exist, attempting update..."

                          echo "=== Secrets stored successfully ==="
                  timeout: 5m

              # -----------------------------------------------------------------
              # Step 4: Cleanup
              # -----------------------------------------------------------------
              - step:
                  name: Cleanup Secrets
                  identifier: cleanup_secrets
                  type: ShellScript
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |
                          #!/bin/bash
                          echo "=== Cleaning up temporary secrets ==="
                          rm -rf /tmp/harness-secrets
                          rm -f /tmp/tf-outputs.json
                          rm -f /tmp/kafka_api_key.txt
                          rm -f /tmp/kafka_api_secret.txt
                          rm -f /tmp/gcp_sa_key_base64.txt
                          echo "=== Cleanup complete ==="
                  timeout: 2m
        tags: {}

  # ===========================================================================
  # Pipeline Variables
  # ===========================================================================
  variables:
    - name: environment
      type: String
      description: Target environment (dev, staging, prod)
      required: true
      default: dev
      value: dev
    - name: confluent_environment_id
      type: String
      description: Confluent Cloud Environment ID (e.g., env-xxxxx)
      required: true
      value: env-o6nrg9
    - name: confluent_kafka_cluster_id
      type: String
      description: Confluent Cloud Kafka Cluster ID (e.g., lkc-xxxxx)
      required: true
      value: lkc-o0gj0x
    - name: confluent_service_account_name
      type: String
      description: Name for the Confluent service account
      required: true
      default: pubsub-connector-sa
      value: pubsub-connector-sa
    - name: connector_name
      type: String
      description: Name for the connector
      required: true
      default: gcp-pubsub-source
      value: gcp-pubsub-source
    - name: kafka_topic
      type: String
      description: Target Kafka topic
      required: true
      value: google.pubsub.test.topic
    - name: gcp_project_id
      type: String
      description: GCP Project ID
      required: true
      value: coastal-pointer-461217-c8
    - name: gcp_service_account_id
      type: String
      description: ID for the GCP service account
      required: true
      default: confluent-pubsub-reader
      value: confluent-pubsub-reader
    - name: pubsub_subscription_id
      type: String
      description: Pub/Sub subscription ID
      required: true
      value: google-pub-sub-test-subscription

  # ===========================================================================
  # Notifications
  # ===========================================================================
  notificationRules:
    - name: Pipeline Status
      identifier: pipeline_status
      pipelineEvents:
        - type: PipelineSuccess
        - type: PipelineFailed
      notificationMethod:
        type: Email
        spec:
          userGroups: []
          recipients:
            - vsiddhapura@psyncopate.com
      enabled: true
