# =============================================================================
# Reusable Terraform Execution Template
# Can be used as a stage template in multiple pipelines
# =============================================================================

template:
  name: Terraform Execution
  identifier: terraform_execution_template
  type: Stage
  projectIdentifier: <+input>
  orgIdentifier: <+input>
  versionLabel: v1.0.0
  description: |
    Reusable template for Terraform plan and apply operations.
    Includes secret setup and cleanup.

  spec:
    type: Custom
    spec:
      execution:
        steps:
          # -----------------------------------------------------------------
          # Step 1: Setup Secrets
          # -----------------------------------------------------------------
          - step:
              name: Setup Secrets
              identifier: setup_secrets
              type: ShellScript
              spec:
                shell: Bash
                onDelegate: true
                source:
                  type: Inline
                  spec:
                    script: |
                      #!/bin/bash
                      set -e

                      echo "=== Setting up secrets directory ==="
                      mkdir -p /tmp/harness-secrets
                      chmod 700 /tmp/harness-secrets

                      # Write GCP credentials if provided
                      if [ -n "$GCP_CREDENTIALS_JSON" ]; then
                        echo "$GCP_CREDENTIALS_JSON" > /tmp/harness-secrets/gcp-sa-key.json
                        chmod 600 /tmp/harness-secrets/gcp-sa-key.json
                        echo "GCP credentials written"
                      fi

                      echo "=== Setup complete ==="
                environmentVariables:
                  - name: GCP_CREDENTIALS_JSON
                    type: Secret
                    value: <+input>
              timeout: 2m

          # -----------------------------------------------------------------
          # Step 2: Terraform Init
          # -----------------------------------------------------------------
          - step:
              name: Terraform Init
              identifier: terraform_init
              type: ShellScript
              spec:
                shell: Bash
                onDelegate: true
                source:
                  type: Inline
                  spec:
                    script: |
                      #!/bin/bash
                      set -e

                      cd <+input>

                      echo "=== Terraform Init ==="
                      terraform init -input=false

                      echo "=== Terraform Validate ==="
                      terraform validate
                environmentVariables:
                  - name: GOOGLE_APPLICATION_CREDENTIALS
                    type: String
                    value: /tmp/harness-secrets/gcp-sa-key.json
              timeout: 5m

          # -----------------------------------------------------------------
          # Step 3: Terraform Plan
          # -----------------------------------------------------------------
          - step:
              name: Terraform Plan
              identifier: terraform_plan
              type: ShellScript
              spec:
                shell: Bash
                onDelegate: true
                source:
                  type: Inline
                  spec:
                    script: |
                      #!/bin/bash
                      set -e

                      cd <+input>

                      echo "=== Terraform Plan ==="
                      terraform plan \
                        -var-file="<+input>" \
                        -out=tfplan \
                        -input=false

                      echo "=== Plan Complete ==="
                environmentVariables: <+input>
              timeout: 10m

          # -----------------------------------------------------------------
          # Step 4: Terraform Apply (Conditional)
          # -----------------------------------------------------------------
          - step:
              name: Terraform Apply
              identifier: terraform_apply
              type: ShellScript
              spec:
                shell: Bash
                onDelegate: true
                source:
                  type: Inline
                  spec:
                    script: |
                      #!/bin/bash
                      set -e

                      cd <+input>

                      echo "=== Terraform Apply ==="
                      terraform apply tfplan

                      echo "=== Apply Complete ==="
                environmentVariables: <+input>
              timeout: 15m
              when:
                stageStatus: Success
                condition: <+input>

          # -----------------------------------------------------------------
          # Step 5: Cleanup
          # -----------------------------------------------------------------
          - step:
              name: Cleanup
              identifier: cleanup
              type: ShellScript
              spec:
                shell: Bash
                onDelegate: true
                source:
                  type: Inline
                  spec:
                    script: |
                      #!/bin/bash
                      echo "=== Cleaning up ==="
                      rm -rf /tmp/harness-secrets
                      echo "=== Cleanup complete ==="
              timeout: 1m
              when:
                stageStatus: All
